name: Build & Upload Release Assets

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            artifact: "installer/*.dmg"
          - os: windows-latest
            platform: windows-x64
            artifact: "installer/*.exe"
          - os: ubuntu-24.04
            platform: linux-x64
            artifact: "installer/*.deb"
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            artifact: "installer/*.deb"

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install portaudio opus

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            portaudio19-dev libportaudio2 \
            libopus0 libopus-dev \
            libasound-dev \
            libxcb-xinerama0 libxkbcommon-x11-0 libegl1 \
            build-essential python3-dev \
            libopenblas-dev liblapack-dev gfortran \
            libatlas-base-dev libssl-dev \
            patchelf autoconf automake libtool cmake \
            dpkg-dev fakeroot \
            meson ninja-build

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: choco install innosetup -y --no-progress

      - name: Add Inno Setup to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:/Program Files (x86)/Inno Setup 6" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: uv sync --extra gui --group dev

      - name: Install unifypy
        run: uv pip install --upgrade unifypy

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify Inno Setup (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: where.exe ISCC.exe && echo "Inno Setup found"

      # 注入可移植 ffmpeg/ffprobe（禁止 brew/apt/choco 动态链接副本）
      # libs/ffmpeg/ 已 gitignore，仅 CI / 本地打包前注入
      - name: Bundle portable FFmpeg into libs/
        shell: bash
        run: |
          chmod +x scripts/bundle_ffmpeg.sh
          if [ "$RUNNER_OS" = "macOS" ]; then
            # mac 无官方多架构 static CDN；从 static-ffmpeg 提取，禁止 Homebrew
            uv pip install static-ffmpeg
            ./scripts/bundle_ffmpeg.sh mac arm64
          elif [ "$RUNNER_OS" = "Windows" ]; then
            ./scripts/bundle_ffmpeg.sh win x64
          else
            if [ "$(uname -m)" = "aarch64" ]; then
              ./scripts/bundle_ffmpeg.sh linux arm64
            else
              ./scripts/bundle_ffmpeg.sh linux x64
            fi
          fi

      - name: Build package
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: |
          rm -f *.spec
          uv run --no-sync unifypy . \
            --config build.json \
            --version ${{ steps.version.outputs.version }} \
            --verbose \
            --clean

      - name: Rename artifact with platform suffix
        shell: bash
        run: |
          mkdir -p dist/release
          for f in ${{ matrix.artifact }}; do
            if [ -f "$f" ]; then
              ext="${f##*.}"
              base="${f%.*}"
              name="$(basename "$base")"
              cp "$f" "dist/release/${name}-${{ matrix.platform }}.${ext}"
            fi
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
